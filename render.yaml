services:
  - type: web
    name: raksha-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USERNAME
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: SARVAM_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: EXPO_ACCESS_TOKEN
        sync: false
      - key: RAKSHA_API_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: ROUTING_WEBHOOK_SECRET
        sync: false
      - key: SUPERVISOR_PHONE
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
